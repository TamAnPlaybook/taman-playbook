<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tâm An — Quản lý Team</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,Helvetica,sans-serif;background:#F0F0F0;color:#1A1A1A;font-size:16px;line-height:1.6;min-height:100vh}

/* SETUP SCREEN */
#setup-screen{min-height:100vh;display:flex;/* visible by default */align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1A1A1A 0%,#2A2A2A 100%)}
.setup-box{background:white;border-radius:20px;padding:32px 28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.setup-logo{font-size:22px;font-weight:700;color:#C8A84B;margin-bottom:4px}
.setup-sub{font-size:13px;color:#999;margin-bottom:24px}
.setup-label{font-size:14px;font-weight:700;color:#555;margin-bottom:6px;display:block}
.setup-input{width:100%;padding:12px 14px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:16px;font-family:Arial;outline:none;margin-bottom:14px;color:#1A1A1A}
.setup-input:focus{border-color:#C8A84B}
.setup-btn{width:100%;padding:14px;background:#1A1A1A;color:#C8A84B;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:Arial;cursor:pointer}
.setup-note{font-size:12px;color:#BBB;margin-top:12px;text-align:center;line-height:1.5}
.setup-err{color:#E53935;font-size:13px;margin-bottom:8px;min-height:18px}

/* APP */
#app{display:none}

/* TOPBAR */
.topbar{background:#1A1A1A;height:54px;display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:300}
.tb-logo{font-size:17px;font-weight:700;color:#C8A84B;flex:1}
.tb-ns{font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);padding:3px 8px;border-radius:20px;white-space:nowrap}
.tb-date{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}

/* MAIN TABS */
.main-tabs{background:#111;display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.06)}
.main-tabs::-webkit-scrollbar{display:none}
.mtab{flex-shrink:0;padding:11px 16px;font-size:14px;font-weight:700;font-family:Arial;color:rgba(255,255,255,.35);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.mtab.on{color:#C8A84B;border-bottom-color:#C8A84B}

/* DATE BAR */
.date-bar{background:white;border-bottom:1px solid #E8E8E8;padding:8px 14px;display:flex;align-items:center;gap:8px}
.db-btn{background:#F0F0F0;border:1px solid #E0E0E0;border-radius:8px;padding:7px 14px;font-size:14px;font-family:Arial;cursor:pointer;font-weight:700}
.db-btn:active{background:#E0E0E0}
.db-cur{flex:1;text-align:center;font-weight:700;font-size:16px}
.db-today{background:#1A7A5E;color:white;border:none;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;font-family:Arial;cursor:pointer}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:white;border-bottom:1px solid #E8E8E8}
.sbox{padding:10px 4px;text-align:center;border-right:1px solid #E8E8E8}
.sbox:last-child{border-right:none}
.sn{font-size:24px;font-weight:700;color:#1A7A5E;line-height:1}
.sl{font-size:11px;color:#999;margin-top:3px;line-height:1.3}

/* SEARCH */
.search-row{background:white;padding:8px 14px;border-bottom:1px solid #E8E8E8;display:flex;gap:8px;align-items:center}
.srch{flex:1;padding:9px 12px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:15px;font-family:Arial;outline:none}
.srch:focus{border-color:#1A7A5E}
.fb{padding:8px 12px;border:1px solid #E0E0E0;border-radius:8px;background:white;font-size:13px;font-weight:700;font-family:Arial;cursor:pointer;white-space:nowrap}
.fb.on{background:#1A1A1A;color:white;border-color:#1A1A1A}

/* PAGES */
.page{display:none}.page.on{display:block}
.content{padding:12px 14px;max-width:900px;margin:0 auto;padding-bottom:80px}

/* SUB TABS */
.stabs{display:flex;gap:3px;margin-bottom:12px;background:white;border-radius:10px;padding:4px;border:1px solid #E8E8E8;overflow-x:auto}
.stab{flex-shrink:0;padding:8px 10px;border-radius:7px;font-size:13px;font-weight:700;font-family:Arial;cursor:pointer;border:none;background:none;color:#999;white-space:nowrap}
.stab.on{background:#1A1A1A;color:white}
.spg{display:none}.spg.on{display:block}

/* MEMBER CARD */
.mc{background:white;border-radius:12px;border:1px solid #E8E8E8;margin-bottom:8px}
.mc.drag-over{border-top:3px solid #1A7A5E}
.mc.dragging{opacity:.4}
.mc-hd{display:flex;align-items:center;padding:13px 14px;gap:10px;cursor:pointer;user-select:none;border-radius:12px}
.mc-hd:active{background:#F7F7F7}
.mc-drag{color:#DDD;font-size:20px;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none;line-height:1}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-role{font-size:13px;color:#999;margin-top:1px}
.mc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.bg{background:#E8F5F0;color:#1A7A5E}.br{background:#FFEBEE;color:#C62828}
.bb{background:#E3F2FD;color:#1565C0}.ba{background:#FFF3E0;color:#E65100}
.bgr{background:#F5F5F5;color:#666}
.sort-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sb{background:#F0F0F0;border:none;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;line-height:1}
.sb:active{background:#E0E0E0}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column}
.modal-hd{padding:16px 18px 14px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:12px;flex-shrink:0}
.modal-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:white;flex-shrink:0}
.modal-title{flex:1}
.modal-name{font-size:17px;font-weight:700}
.modal-sub{font-size:12px;color:#999;margin-top:2px}
.modal-x{width:34px;height:34px;border-radius:50%;background:#F0F0F0;border:none;font-size:18px;cursor:pointer;flex-shrink:0}
.modal-body{overflow-y:auto;flex:1;padding:0 18px 8px}
.modal-foot{padding:12px 18px;display:flex;gap:8px;border-top:1px solid #F0F0F0;flex-shrink:0}

/* MODAL SECTIONS */
.msec{margin-top:16px}
.msec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#AAA;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* TOGGLE ROW */
.trow{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #F5F5F5;gap:10px}
.trow:last-child{border-bottom:none}
.tlbl{flex:1;font-size:15px;line-height:1.4}
.tnote{font-size:12px;color:#BBB;margin-top:2px}

/* TOGGLE BUTTONS */
.tg{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid #E0E0E0;flex-shrink:0}
.tgb{padding:7px 12px;font-size:13px;font-weight:700;font-family:Arial;border:none;background:white;color:#CCC;cursor:pointer;border-right:1.5px solid #E0E0E0;white-space:nowrap;min-width:46px;text-align:center}
.tgb:last-child{border-right:none}
.tg-y{background:#1A7A5E!important;color:white!important;border-color:#1A7A5E!important}
.tg-n{background:#FFEBEE!important;color:#C62828!important;border-color:#FFCDD2!important}
.tg-m{background:#FFF3E0!important;color:#E65100!important;border-color:#FFE0B2!important}

/* SKILLS */
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#EBEBEB;border-radius:10px;overflow:hidden;margin-top:8px}
.ski{background:white;padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ski:active{background:#F7F7F7}
.skc{width:24px;height:24px;min-width:24px;border-radius:50%;border:2px solid #DDD;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .15s}
.skc.done{background:#1A7A5E;border-color:#1A7A5E;color:white}
.sklbl{font-size:13px;line-height:1.3}

/* KPI INPUTS */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.kpib{background:#F7F7F7;border-radius:10px;padding:12px;border:1.5px solid #EBEBEB}
.kpilbl{font-size:12px;color:#888;margin-bottom:5px}
.kpiinp{width:100%;border:none;background:none;font-size:22px;font-weight:700;color:#1A7A5E;font-family:Arial;outline:none}

/* CHARTS */
.chart-wrap{background:white;border-radius:12px;border:1px solid #E8E8E8;padding:14px;margin-bottom:10px}
.chart-title{font-size:14px;font-weight:700;margin-bottom:10px}
.chart-bars{display:flex;gap:8px;align-items:flex-end;height:90px;overflow-x:auto;padding-bottom:2px}
.cbar-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:34px;flex-shrink:0}
.cbar{width:30px;border-radius:4px 4px 0 0;min-height:2px}
.cday{font-size:10px;color:#999}
.cval{font-size:10px;font-weight:700;color:#555}

/* MONTH KPI */
.month-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mkbox{background:#F7F7F7;border-radius:10px;padding:12px;border:1.5px solid #EBEBEB;text-align:center}
.mkn{font-size:26px;font-weight:700;color:#1A7A5E}
.mkl{font-size:12px;color:#888;margin-top:4px}

/* SELECT */
.sel{width:100%;padding:9px 10px;border:1.5px solid #E0E0E0;border-radius:9px;font-size:15px;font-family:Arial;background:white;outline:none;cursor:pointer}
.sel:focus{border-color:#1A7A5E}

/* REPORT */
.rep-card{background:white;border-radius:12px;border:1px solid #E8E8E8;padding:16px;margin-bottom:10px}
.rep-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rep-item{background:#F7F7F7;border-radius:9px;padding:10px;text-align:center}
.rep-val{font-size:20px;font-weight:700;color:#1A7A5E}
.rep-lbl{font-size:11px;color:#888;margin-top:3px}

/* OV TABLE */
.ov-wrap{overflow-x:auto;border-radius:12px;border:1px solid #E8E8E8;margin-bottom:10px}
.ovt{border-collapse:collapse;width:100%;min-width:520px}
.ovt th{background:#1A1A1A;color:#C8A84B;padding:10px 10px;font-size:12px;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08);text-align:center}
.ovt th:first-child{text-align:left}
.ovt td{padding:9px 10px;border-bottom:1px solid #F5F5F5;font-size:13px;text-align:center;border-right:1px solid #F0F0F0}
.ovt td:first-child{text-align:left;font-weight:700}
.ovt tr:last-child td{border-bottom:none}

/* BTN */
.btn{padding:13px 18px;border-radius:10px;font-size:15px;font-weight:700;font-family:Arial;cursor:pointer;border:none;flex:1;text-align:center}
.btn:active{opacity:.85}
.btn-g{background:#1A7A5E;color:white}
.btn-d{background:#1A1A1A;color:white}
.btn-o{background:white;color:#1A1A1A;border:1.5px solid #E0E0E0}
.btn-r{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
.add-btn{width:100%;padding:15px;background:white;border:2px dashed #DDD;border-radius:12px;font-size:15px;font-weight:700;font-family:Arial;color:#AAA;cursor:pointer;text-align:center;margin-bottom:14px}
.add-btn:active{border-color:#1A7A5E;color:#1A7A5E;background:#E8F5F0}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(90px);background:#1A1A1A;color:white;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;border:1px solid rgba(200,168,75,.35);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PCt SLIDER */
.pct-wrap{display:flex;align-items:center;gap:12px;padding:8px 0}
input[type=range]{flex:1;height:6px;accent-color:#1A7A5E;cursor:pointer}
.pct-display{font-size:26px;font-weight:700;color:#1A7A5E;min-width:60px;text-align:right}

/* TREE */
.tree-canvas-wrap{cursor:grab}.tree-canvas-wrap.panning{cursor:grabbing}
.tnode{position:absolute;width:120px;cursor:pointer;user-select:none;transform:translate(-50%,-50%)}
.tnode-box{background:white;border-radius:12px;border:2px solid #E0E0E0;padding:8px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:border-color .15s,box-shadow .15s;position:relative}
.tnode-box:hover{border-color:#C8A84B;box-shadow:0 4px 16px rgba(0,0,0,.14)}
.tnode-box.tnode-root{border-color:#C8A84B;background:#1A1A1A}
.tnode-box.tnode-root .tn-name{color:#C8A84B}
.tnode-box.tnode-root .tn-meta{color:rgba(200,168,75,.7)}
.tnode-box.tnode-present{border-color:#1A7A5E}
.tn-name{font-size:13px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn-meta{font-size:10px;color:#AAA;margin-top:3px;line-height:1.3}
.tn-date{font-size:11px;font-weight:700;color:#1A7A5E;margin-top:2px}
.tn-add{position:absolute;width:22px;height:22px;border-radius:50%;background:#1A7A5E;color:white;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;bottom:-11px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:10;line-height:1}
.tn-add:hover{background:#145f49}
.tn-add-l{left:20%}.tn-add-r{right:20%;left:auto}
.layer-label{position:absolute;font-size:11px;font-weight:700;color:#AAA;pointer-events:none;white-space:nowrap}
.layer-sep{position:absolute;border:none;border-top:3px solid #C8A84B;pointer-events:none;opacity:.7}
/* Node modal */
.nmod-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:flex-end;justify-content:center}
.nmod-ov.open{display:flex}
.nmod{background:white;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column}
.nmod-hd{padding:15px 18px 12px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nmod-title{flex:1;font-size:17px;font-weight:700}
.nmod-x{width:32px;height:32px;border-radius:50%;background:#F0F0F0;border:none;font-size:17px;cursor:pointer;flex-shrink:0}
.nmod-body{overflow-y:auto;flex:1;padding:14px 18px}
.nmod-foot{padding:12px 18px;display:flex;gap:8px;border-top:1px solid #F0F0F0;flex-shrink:0}
.nmod-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F5F5F5;gap:10px}
.nmod-row:last-child{border-bottom:none}
.nmod-lbl{flex:1;font-size:15px;font-weight:500}
.nmod-inp{border:1.5px solid #E0E0E0;border-radius:9px;padding:8px 12px;font-size:15px;font-family:Arial;outline:none;background:white}
.nmod-inp:focus{border-color:#1A7A5E}

@media(max-width:480px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .skill-grid,.kpi-grid,.month-kpi-grid,.rep-grid{grid-template-columns:1fr}
}
@media(min-width:700px){
  .skill-grid{grid-template-columns:repeat(3,1fr)}
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .rep-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
  <!-- Firebase CDN (compat = global firebase.* API, no dynamic import needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen">
  <div class="setup-box" id="setup-box-inner">
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">Tâm An</div>
    <div class="tb-ns" id="tb-ns"></div>
    <div class="tb-date" id="tb-date"></div><button id="logout-btn" onclick="doLogout()" style="background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:4px 10px;border-radius:6px;font-size:11px;font-family:Arial;cursor:pointer;flex-shrink:0">Thoát</button>
  </div>
  <div class="main-tabs">
    <button class="mtab on" onclick="showMain('dd',this)">📋 Điểm danh</button>
    <button class="mtab" onclick="showMain('month',this)">📅 Tháng</button>
    <button class="mtab" onclick="showMain('nhatky',this)">📓 Nhật ký</button>
    <button class="mtab" onclick="showMain('tree',this)">🌳 Sơ đồ</button>
    <button class="mtab" onclick="showMain('guide',this)">📖 Hướng dẫn</button>
  </div>
  <div class="date-bar">
    <button class="db-btn" onclick="changeDay(-1)">‹</button>
    <div class="db-cur" id="date-display"></div>
    <button class="db-today" onclick="goToday()">Hôm nay</button>
    <button class="db-btn" onclick="changeDay(1)">›</button>
  </div>
  <div class="stats-bar">
    <div class="sbox"><div class="sn" id="s-total">0</div><div class="sl">Tổng TV</div></div>
    <div class="sbox"><div class="sn" id="s-sang">0</div><div class="sl">Có mặt sáng</div></div>
    <div class="sbox"><div class="sn" id="s-trua">0</div><div class="sl">Có mặt trưa</div></div>
    <div class="sbox"><div class="sn" id="s-kn">0</div><div class="sl">Đủ kỹ năng</div></div>
  </div>
  <div class="search-row">
    <input type="text" class="srch" id="srch" placeholder="🔍 Tìm tên..." oninput="renderAll()">
    <button class="fb on" id="fb-all" onclick="setFilter('all',this)">Tất cả</button>
    <button class="fb" id="fb-vang" onclick="setFilter('vang',this)">Vắng</button>
  </div>

  <!-- ĐIỂM DANH -->
  <div class="page on" id="page-dd">
    <div class="content">
      <div class="stabs">
        <button class="stab on" onclick="switchSub('dd','sang',this)">🌅 Sáng</button>
        <button class="stab" onclick="switchSub('dd','trua',this)">☀️ Trưa</button>
        <button class="stab" onclick="switchSub('dd','toi',this)">🌙 Tối</button>
        <button class="stab" onclick="switchSub('dd','kn',this)">⭐ Kỹ năng</button>
        <button class="stab" onclick="switchSub('dd','ov',this)">📊 Tổng</button>
      </div>
      <div class="spg on" id="dd-sang"><div id="list-sang"></div><button class="add-btn" onclick="openAddModal()">+ Thêm thành viên</button></div>
      <div class="spg" id="dd-trua"><div id="list-trua"></div></div>
      <div class="spg" id="dd-toi"><div id="list-toi"></div></div>
      <div class="spg" id="dd-kn"><div id="list-kn"></div></div>
      <div class="spg" id="dd-ov">
        <div id="ov-table"></div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <button class="btn btn-g btn-sm" onclick="copySummary()">📋 Copy báo cáo</button>
          <button class="btn btn-d btn-sm" onclick="copyTable()">📊 Copy bảng</button>
          <button class="btn btn-r btn-sm" onclick="sendToLeader()">📤 Gửi lên Leader</button>
        </div>
      </div>
    </div>
  </div>


  <!-- THÁNG -->
  <div class="page" id="page-month">
    <div class="content">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <button class="db-btn" onclick="changeMonth(-1)">‹</button>
        <div style="flex:1;text-align:center;font-weight:700;font-size:16px" id="month-display"></div>

<script>
// ===================== CONFIG =====================

const HUY_SHEET_URL = 'https://script.google.com/macros/s/AKfycbyV-DJvMSPCUvioId9Dzk4-XOolSL5nms5j158J2mBQE_Bk5U4h0VNd6fyBT4v3TeE2Hw/exec';

  {id:'followup2',lbl:'Follow-up lần 2,3...',icon:'🔄',t:'num',note:'Số khách đang theo sát'},
  {id:'baotro_new',lbl:'Bảo trợ TV mới',icon:'🌱',t:'num',note:'Số TV mới được bảo trợ hôm nay'},

  {id:'pct',lbl:'% Hoàn thành ngày',icon:'🎯',t:'pct',note:'Tự đánh giá 0–100%'},

const MONTH_KPI=[
  {id:'m_lophoc',lbl:'Học viên đến lớp',icon:'🏫',note:'Số người tham dự lớp học nghề'},
  {id:'m_zoom',lbl:'Người vào Zoom',icon:'🖥',note:'Tổng lượt tham dự Zoom trong tháng'},
  {id:'m_id_new',lbl:'ID mới trong tháng',icon:'🆕',note:'Số thành viên mới vào hệ thống'},
  {id:'m_clb',lbl:'Buổi CLB trong tháng',icon:'🏥',note:'Tổng số buổi phục vụ tại CLB'},
];
const COLORS=['#E53935','#8E24AA','#1565C0','#00897B','#F4511E','#6D4C41','#3949AB','#039BE5','#43A047','#FB8C00','#546E7A','#D81B60','#00ACC1','#7CB342','#5E35B1','#c0392b'];

// ===================== STATE =====================
let NS=''; // namespace = tên leader, isolates localStorage
let members=[];
let currentDay=new Date();
let currentMonth={y:new Date().getFullYear(),m:new Date().getMonth()};
let filterMode='all';
let modalMid=null;
let modalType=null;
let dragSrc=null;

// ===================== NAMESPACE STORAGE =====================
function nsKey(k){return 'ta_'+NS+'_'+k;}
function nmGet(k,def=''){try{return localStorage.getItem(nsKey(k))||def;}catch(e){return def;}}
function nmSet(k,v){try{localStorage.setItem(nsKey(k),v);}catch(e){}}
// Day-scoped
function dk(){const d=currentDay;return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dGet(mid,f){return nmGet('d_'+mid+'_'+dk()+'_'+f);}
function dSet(mid,f,v){nmSet('d_'+mid+'_'+dk()+'_'+f,v);}
// Month-scoped
function mk2(){return currentMonth.y+'-'+currentMonth.m;}
function mGet(mid,f){return nmGet('mo_'+mid+'_'+mk2()+'_'+f);}
function mSet(mid,f,v){nmSet('mo_'+mid+'_'+mk2()+'_'+f,v);}
// Persistent (skills, KH)
function pGet(mid,f,def=''){return nmGet('p_'+mid+'_'+f,def);}
function pSet(mid,f,v){nmSet('p_'+mid+'_'+f,v);}
// Members list
// ===================== SETUP =====================
function enterApp(name){
  var n=name||'';
  if(!n)return;
  NS=n.toLowerCase().replace(/\s+/g,'_');
  try{localStorage.setItem('ta_last_ns',NS);localStorage.setItem('ta_last_name',n);}catch(e){}
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tb-ns').textContent='👤 '+n;
  loadMembers();
  loadTree2();
  var now=new Date();
  currentDay=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  updateDateDisplay();
  updateMonthDisplay();
  document.getElementById('tb-date').textContent=fmtDate(now);
  renderAll();
  updateStats();
  populateBcSel();
  renderMonthPage();
}


window.onload=function(){buildSecureSetup();};

// ===================== HELPERS =====================
function uid(){return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function fmtDate(d){const days=['CN','T2','T3','T4','T5','T6','T7'];return days[d.getDay()]+', '+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function fmtMonth(y,m){const names=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];return names[m]+' / '+y;}
function getColor(i){return COLORS[i%COLORS.length];}
function getInit(n){const p=n.trim().split(' ');return p.length>=2?p[p.length-1][0].toUpperCase():n[0].toUpperCase();}
function countSkills(id){return SKILLS.filter(s=>pGet(id,'sk_'+s.id)==='1').length;}
function getFiltered(){
  let list=members;
  const q=(document.getElementById('srch')||{value:''}).value.trim().toLowerCase();
  if(q)list=list.filter(m=>m.name.toLowerCase().includes(q));
  if(filterMode==='vang')list=list.filter(m=>dGet(m.id,'sang')!=='yes');
  return list;
}

// ===================== RENDER ALL =====================
function renderAll(){
  ['sang','trua','toi','kn','kh'].forEach(t=>renderList(t));
  renderOverview();
}

// ===================== RENDER LIST =====================
function renderList(type){
  const el=document.getElementById('list-'+type);
  if(!el)return;
  const list=getFiltered();
  if(list.length===0){el.innerHTML='<div style="text-align:center;color:#BBB;padding:24px;font-size:14px">Không có thành viên nào</div>';return;}
  el.innerHTML=list.map(m=>{
    const ri=members.indexOf(m);
    const color=getColor(ri);
    const init=getInit(m.name);
    let badges='';
    if(type==='sang'){
      const sv=dGet(m.id,'sang'),cv=dGet(m.id,'cam');
      if(sv==='yes')badges+='<span class="badge bg">✓ Có mặt</span>';
      else if(sv==='no')badges+='<span class="badge br">✗ Vắng</span>';
      if(cv==='on')badges+='<span class="badge bb">📷 Mở cam</span>';
      else if(cv==='off')badges+='<span class="badge bgr">🚫 Tắt cam</span>';
    }else if(type==='trua'){
      const nv=dGet(m.id,'trua'),lv=dGet(m.id,'trua_lv');
      if(nv==='yes')badges+='<span class="badge bg">✓ Có mặt</span>';
      else if(nv==='no')badges+='<span class="badge br">✗ Vắng</span>';
      if(lv==='master')badges+='<span class="badge bg">🎯 Làm chủ</span>';
      else if(lv==='practice')badges+='<span class="badge ba">🔄 Luyện thêm</span>';
    }else if(type==='toi'){
      const tv=dGet(m.id,'toi'),tc=dGet(m.id,'toi_type');
      if(tv==='yes')badges+='<span class="badge bg">✓ Có mặt</span>';
      else if(tv==='no')badges+='<span class="badge br">✗ Vắng</span>';
      if(tc==='clb')badges+='<span class="badge bb">CLB</span>';
      else if(tc==='ht')badges+='<span class="badge ba">Hệ thống</span>';
    }else if(type==='kn'){
      const sc=countSkills(m.id);
      badges+='<span class="badge '+(sc===SKILLS.length?'bg':sc>0?'ba':'bgr')+'">'+sc+'/'+SKILLS.length+' kỹ năng</span>';
    }else if(type==='kh'){
      const pct=parseInt(pGet(m.id,'kh_pct_'+dk(),'0'))||0;
      badges+='<span class="badge '+(pct>=80?'bg':pct>=50?'ba':'br')+'">'+pct+'% hôm nay</span>';
    }
    return `<div class="mc" id="mc-${type}-${m.id}" draggable="true"
      ondragstart="dragStart(event,'${m.id}')" ondragover="dragOver(event,'${m.id}')"
      ondrop="dragDrop(event,'${m.id}')" ondragleave="dragLeave(event,'${m.id}')">
      <div class="mc-hd" onclick="openModal('${m.id}','${type}')">
        <div class="mc-drag" onclick="event.stopPropagation()">⠿</div>
        <div class="av" style="background:${color}">${init}</div>
        <div class="mc-info">
          <div class="mc-name">${m.name}</div>
          <div class="mc-role">${m.role}${m.baotro?' · '+m.baotro:''}</div>
          <div class="mc-badges">${badges}</div>
        </div>
        ${type==='kn'?`<div style="font-size:22px;font-weight:700;color:#1A7A5E;text-align:center;min-width:36px">${countSkills(m.id)}<div style="font-size:10px;color:#AAA">/${SKILLS.length}</div></div>`:''}
        <div class="sort-btns">
          <button class="sb" onclick="event.stopPropagation();moveMember('${m.id}',-1)">▲</button>
          <button class="sb" onclick="event.stopPropagation();moveMember('${m.id}',1)">▼</button>
        </div>
        <span class="chev">›</span>
      </div>
    </div>`;
  }).join('');
}

// ===================== DRAG & DROP =====================
function dragStart(e,id){dragSrc=id;setTimeout(()=>{const el=document.getElementById('mc-'+modalType+'-'+id)||document.querySelector('[id$="-'+id+'"]');if(el)el.classList.add('dragging');},0);}
function dragOver(e,id){e.preventDefault();if(id!==dragSrc){document.querySelectorAll('[id$="-'+id+'"]').forEach(el=>el.classList.add('drag-over'));}}
function dragLeave(e,id){document.querySelectorAll('[id$="-'+id+'"]').forEach(el=>el.classList.remove('drag-over'));}
function dragDrop(e,id){
  e.preventDefault();
  document.querySelectorAll('.mc').forEach(el=>{el.classList.remove('drag-over','dragging');});
  if(!dragSrc||dragSrc===id)return;
  const si=members.findIndex(m=>m.id===dragSrc);
  const ti=members.findIndex(m=>m.id===id);
  if(si<0||ti<0)return;
  const tmp=members.splice(si,1)[0];
  members.splice(ti,0,tmp);
  saveMembers();
  renderAll();
  dragSrc=null;
}
function moveMember(id,dir){
  const i=members.findIndex(m=>m.id===id);
  if(i<0)return;
  const j=i+dir;
  if(j<0||j>=members.length)return;
  [members[i],members[j]]=[members[j],members[i]];
  saveMembers();
  renderAll();
}

// ===================== MODAL =====================
function openModal(mid,type){
  const m=members.find(m=>m.id===mid);
  if(!m)return;
  modalMid=mid;modalType=type;
  const ri=members.indexOf(m);
  const color=getColor(ri);
  const init=getInit(m.name);
  document.getElementById('m-av').style.background=color;
  document.getElementById('m-av').textContent=init;
  document.getElementById('m-name').textContent=m.name;
  document.getElementById('m-sub').textContent=m.role+(m.baotro?' · Bảo trợ: '+m.baotro:'')+
    (m.leader_nhanh?' · Leader nhánh: '+m.leader_nhanh:'');
  document.getElementById('m-save-btn').textContent='✓ Lưu & Đóng';
  document.getElementById('m-save-btn').onclick=saveModal;
  document.getElementById('m-body').innerHTML=buildBody(m,type);
  document.getElementById('modal-ov').classList.add('open');
  document.body.style.overflow='hidden';
}

  document.getElementById('m-save-btn').onclick=saveNewMember;
  // Build name options from treeNodes
  var treeNameOpts=treeNodes.map(function(n){return '<option value="'+n.name+'">'+n.name+'</option>';}).join('');
  document.getElementById('m-body').innerHTML=`
    <div class="msec">
      <div class="msec-title">👤 Thông tin</div>
      <div class="trow"><div class="tlbl">Họ tên <span style="color:#E53935">*</span><div class="tnote">Chọn từ sơ đồ hoặc nhập tên mới</div></div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <select id="new-name-sel" class="sel" style="width:200px" onchange="var v=this.value;if(v){document.getElementById('new-name').value=v;}">
            <option value="">— Chọn từ sơ đồ —</option>${treeNameOpts}
          </select>
          <input id="new-name" class="sel" style="width:200px" placeholder="Hoặc nhập tên mới..." autofocus>
        </div>
      </div>
      <div class="trow"><div class="tlbl">Vai trò</div>
        <select id="new-role" class="sel" style="width:180px">
          <option>Thành viên</option><option>Leader 1★</option><option>Leader 2★</option><option>Leader 3★</option><option>Sapphire</option><option>Ruby</option><option>Pearl</option><option>Emerald</option><option>Diamond</option><option>Crown Ambassador</option>
        </select>
      </div>
    </div>`;
  document.getElementById('modal-ov').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>{const el=document.getElementById('new-name');if(el)el.focus();},200);
}

function saveNewMember(){
  const n=document.getElementById('new-name');
  const r=document.getElementById('new-role');
  if(!n||!n.value.trim()){if(n){n.style.borderColor='#E53935';n.focus();}return;}
  members.push({id:uid(),name:n.value.trim(),role:r?r.value:'TV',baotro:'',leader_nhanh:''});
  saveMembers();
  closeModal();
  renderAll();updateStats();populateBcSel();
  showToast('✓ Đã thêm: '+n.value.trim());
}

function saveModal(){
  if(!modalMid||modalMid==='__new__')return;
  const m=members.find(x=>x.id===modalMid);
  if(!m)return;
  // Collect info fields
  const nameEl=document.getElementById('mi-name');
  const roleEl=document.getElementById('mi-role');
  const baotroEl=document.getElementById('mi-baotro');
  const leaderEl=document.getElementById('mi-leader');
  if(nameEl&&nameEl.value.trim())m.name=nameEl.value.trim();
  if(roleEl)m.role=roleEl.value;
  if(baotroEl)m.baotro=baotroEl.value;
  if(leaderEl)m.leader_nhanh=leaderEl.value;
  // KH collect
  KH.forEach(f=>{
    if(f.t==='num'){
      const el=document.getElementById('kh-inp-'+f.id);
      if(el)pSet(modalMid,'kh_'+f.id+'_'+dk(),el.value||'0');
    }else if(f.t==='text'){
      const el=document.getElementById('kh-inp-'+f.id);
      if(el)pSet(modalMid,'kh_'+f.id+'_'+dk(),el.value||'');
    }else if(f.t==='pct'){
      const el=document.getElementById('kh-inp-'+f.id);
      if(el)pSet(modalMid,'kh_'+f.id+'_'+dk(),el.value||'0');
    }
  });
  saveMembers();
  closeModal();
  renderAll();updateStats();populateBcSel();
  showToast('✓ Đã lưu cho '+m.name);
}

function closeModal(){
  document.getElementById('modal-ov').classList.remove('open');

}

function buildTgSection(title,rows,mid){
  return `<div class="msec"><div class="msec-title">${title}</div>
  ${rows.map(row=>{
    const curVal=row.scoped==='day'?dGet(mid,row.field):'';
    return `<div class="trow">
      <div class="tlbl">${row.lbl}${row.note?`<div class="tnote">${row.note}</div>`:''}
      </div>
      <div class="tg" id="tg-${mid}-${row.field}">
        ${row.btns.map(([lbl,val,cls])=>`<button class="tgb${curVal===val?' '+cls:''}"
          onclick="toggleDay('${mid}','${row.field}','${val}',this.closest('.tg'),['${row.btns.map(b=>b[2]).join("','")}'])">${lbl}</button>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ===================== TOGGLE HANDLERS =====================
function toggleDay(mid,field,val,tgEl,classes){
  const cur=dGet(mid,field);
  const nv=cur===val?'':val;
  dSet(mid,field,nv);
  if(!tgEl)return;
  tgEl.querySelectorAll('.tgb').forEach((b,i)=>{
    b.classList.remove(...classes);
    const bval=b.getAttribute('onclick').match(/'([^']+)'/g);
    if(bval&&bval[1]){
      const bv=bval[1].replace(/'/g,'');
      if(nv&&nv===bv)b.classList.add(classes[i]||classes[0]);
    }
  });
  renderList(modalType);
  updateStats();
}

function toggleKhCheck(mid,field,val,tgEl){
  const cur=pGet(mid,'kh_check_'+field+'_'+dk(),'');
  const nv=cur===val?'':val;
  pSet(mid,'kh_check_'+field+'_'+dk(),nv);
  if(!tgEl)return;
  tgEl.querySelectorAll('.tgb').forEach(b=>{b.classList.remove('tg-y','tg-n');});
  if(nv==='yes')tgEl.querySelectorAll('.tgb')[0].classList.add('tg-y');
  else if(nv==='no')tgEl.querySelectorAll('.tgb')[1].classList.add('tg-n');
}

function toggleSkill(mid,sid,row){
  const nv=pGet(mid,'sk_'+sid)==='1'?'0':'1';
  pSet(mid,'sk_'+sid,nv);
  const c=row.querySelector('.skc');
  if(c){c.classList.toggle('done',nv==='1');c.textContent=nv==='1'?'✓':'';}
}

function deleteMember(id){
  members=members.filter(m=>m.id!==id);

  renderAll();updateStats();populateBcSel();

}

    <div class="chart-wrap">
      <div class="chart-title">${f.icon} ${f.lbl}</div>
      ${members.map(m=>{
        const bars=days7.map(d=>{
          const dstr=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
          const v=parseInt(nmGet('p_'+m.id+'_kh_'+f.id+'_'+dstr,'0'))||0;
          return{d,v};
        });
        const mx=Math.max(...bars.map(b=>b.v),1);
        const dnames=['CN','T2','T3','T4','T5','T6','T7'];
        return `<div style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:4px">${m.name}</div>
          <div class="chart-bars">${bars.map(b=>{

              <div class="cval">${b.v||''}</div>
              <div class="cbar" style="height:${h}px;background:${b.v>0?'#1A7A5E':'#E8E8E8'}"></div>

          }).join('')}</div>
        </div>`;
      }).join('')}
    </div>`).join('');

function get7Days(){
  return Array.from({length:7},(_,i)=>{const d=new Date(currentDay);d.setDate(d.getDate()-6+i);return d;});

function copyText(t){
  try{
    navigator.clipboard.writeText(t).then(()=>showToast('✓ Đã copy!')).catch(()=>{fallbackCopy(t);});
  }catch(e){fallbackCopy(t);}
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.top='-9999px';
  document.body.appendChild(ta);ta.select();try{document.execCommand('copy');showToast('✓ Đã copy!');}catch(e){showToast('⚠ Copy thủ công: chọn text và Ctrl+C');}
  document.body.removeChild(ta);
}

function buildPayload(type,mid){
  const ns=localStorage.getItem('ta_last_name')||NS;
  const d=currentDay;
  const ds=d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
  if(type==='summary'){
    return{
      ngay:ds,ten:ns,capdo:'Leader',
      buoiCLB:members.filter(m=>dGet(m.id,'sang')==='yes').length,
      moiNguoi:members.filter(m=>dGet(m.id,'trua')==='yes').length,
      followUp:members.filter(m=>dGet(m.id,'toi')==='yes').length,
      s1:members.length,s2:members.filter(m=>dGet(m.id,'sang')==='yes').length,
      s3:members.filter(m=>dGet(m.id,'trua')==='yes').length,
      s4:members.filter(m=>countSkills(m.id)>=SKILLS.length).length,
      s5:0,s6:0,
      diemTB:'—',
      ghiChu:`Team: ${members.length} TV | Sáng: ${members.filter(m=>dGet(m.id,'sang')==='yes').length} | Trưa: ${members.filter(m=>dGet(m.id,'trua')==='yes').length} | Tối: ${members.filter(m=>dGet(m.id,'toi')==='yes').length}`,
    };
  }
  if(type==='person'&&mid){
    const m=members.find(x=>x.id===mid);
    if(!m)return null;
    return{
      ngay:ds,ten:ns+' → '+m.name,capdo:m.role,
      buoiCLB:pGet(mid,'kh_post_zalo_'+dk(),'0'),
      moiNguoi:pGet(mid,'kh_call_new_'+dk(),'0'),
      followUp:pGet(mid,'kh_followup2_'+dk(),'0'),
      s1:parseInt(pGet(mid,'kh_pct_'+dk(),'0'))||0,
      s2:countSkills(mid),s3:dGet(mid,'sang')==='yes'?10:0,
      s4:dGet(mid,'trua')==='yes'?10:0,s5:dGet(mid,'toi')==='yes'?10:0,s6:0,
      diemTB:pGet(mid,'kh_pct_'+dk(),'0'),
      ghiChu:pGet(mid,'kh_care_fam_'+dk(),''),
    };
  }
  return null;
}

function sendToSheet(payload,cb){
  if(!payload)return;
  fetch(HUY_SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(()=>cb&&cb(true))
    .catch(()=>cb&&cb(false));
}

// ── FIREBASE (compat API — no dynamic import, works on GitHub Pages) ──
let fbApp=null, fbAuth=null, fbDb=null, fbUser=null, fbReady=false;

function loadFirebase() {
  return new Promise(function(resolve, reject) {
    // Retry up to 30 times (3 seconds) if SDK not yet loaded
    var attempts = 0;
    function tryInit() {
      attempts++;
      if(typeof firebase === 'undefined') {
        if(attempts < 30) { setTimeout(tryInit, 100); return; }
        reject(new Error('Firebase SDK không tải được. Kiểm tra kết nối mạng.'));
        return;
      }
      try {
        // Avoid re-initializing
        if(!fbApp) {
          try { fbApp = firebase.app(); }
          catch(e) { fbApp = firebase.initializeApp(FIREBASE_CONFIG); }
        }
        fbAuth = firebase.auth();
        fbDb   = firebase.firestore();
        fbReady = true;
        // Only register once
        if(!window._authListenerSet) {
          window._authListenerSet = true;
          firebase.auth().onAuthStateChanged(function(user) {
            fbUser = user;
            if(user) { enterAppFirebase(user); }
            else {
              // Not logged in — show login form
              setFbLoading(false);
            }
          });
        }
        resolve();
      } catch(e) {
        reject(e);
      }
    }
    tryInit();
  });
}

async function fbSaveMembers(membersData) {
  if(!fbDb||!fbUser)return;
  await fbDb.collection('users').doc(fbUser.uid)
    .collection('data').doc('members')
    .set({members: membersData, updatedAt: new Date().toISOString()});

async function fbLoadMembers() {
  if(!fbDb||!fbUser)return null;
  const snap = await fbDb.collection('users').doc(fbUser.uid)
    .collection('data').doc('members').get();
  return snap.exists ? snap.data().members : null;
}

  await fbDb.collection('users').doc(fbUser.uid)
    .collection('data').doc('tree')

}
async function fbLoadTree() {
  if(!fbDb||!fbUser)return null;
  const snap = await fbDb.collection('users').doc(fbUser.uid)
    .collection('data').doc('tree').get();
  return snap.exists ? snap.data().nodes : null;
}

function saveMembers() {
  const json = JSON.stringify(members);
  nmSet('members', json); // local backup
  if(fbDb && fbUser) fbSaveMembers(members).catch(e=>console.warn('Firestore save:', e));
}

function loadMembers() {
  // Load local first (instant), then sync from Firestore
  try {
    const s = nmGet('members');
    if(s) members = JSON.parse(s);
    else members = [];
  } catch(e) { members = []; }

  if(fbDb && fbUser) {
    fbLoadMembers().then(remote => {
      if(remote && remote.length > 0) {
        members = remote;
        nmSet('members', JSON.stringify(members));
        renderAll(); updateStats(); populateBcSel();
      }
    }).catch(e => console.warn('Firestore load:', e));
  }
}

}

function showFbForm(name) {

    const el=document.getElementById('form-'+f);
    if(el) el.style.display=f===name?'block':'none';
  });

  if(errEl) errEl.textContent='';

function showErr(msg) {
  const errEl=document.getElementById('setup-err');
  if(errEl) errEl.textContent=msg;
}

function togglePwd(id, icon) {
  const inp=document.getElementById(id);
  if(!inp) return;
  inp.type = inp.type==='password'?'text':'password';
  icon.textContent = inp.type==='password'?'👁':'🙈';
}

function checkPwdStrength(pwd) {
  const bar=document.getElementById('pwd-bar');
  if(!bar) return;
  let score=0;
  if(pwd.length>=6)score++;
  if(pwd.length>=10)score++;
  if(/[A-Z]/.test(pwd))score++;
  if(/[0-9]/.test(pwd))score++;
  if(/[^A-Za-z0-9]/.test(pwd))score++;
  const pct=score*20;
  const colors=['#E53935','#E53935','#FB8C00','#FDD835','#43A047','#1A7A5E'];
  bar.style.width=pct+'%';
  bar.style.background=colors[score]||'#E53935';
}

async function fbDoLogin() {

  if(!email||!pwd){showErr('Vui lòng nhập email và mật khẩu');return;}

// ── Tree state vars ──────────────────────────────────────────────
var treeNodes = [];
var treeScale = 1, treeOffset = {x:0,y:0};
var treePanning = false, treePanStart = {x:0,y:0};
var activeNodeModal = null;
var NW = 144, NH = 80, HGAP = 40, VGAP = 116;
var selectedHighlight = null;


function treeKey2(){ return 'tree_nodes_v2'; }
function loadTree2(){
  try{ var s=nmGet(treeKey2()); treeNodes=s?JSON.parse(s):[]; }catch(e){ treeNodes=[]; }
  // Firestore background sync
  if(fbDb&&fbUser){
    fbDb.collection('users').doc(fbUser.uid).collection('data').doc('tree').get()
      .then(function(snap){
        if(snap.exists&&snap.data().nodes&&snap.data().nodes.length){
          treeNodes=snap.data().nodes;
          nmSet(treeKey2(),JSON.stringify(treeNodes));
          var page=document.getElementById('page-tree');
          if(page&&page.classList.contains('on')) renderTree();
        }
      }).catch(function(){});
  }
}
function saveTree2(){
  nmSet(treeKey2(),JSON.stringify(treeNodes));
  if(fbDb&&fbUser){
    fbDb.collection('users').doc(fbUser.uid).collection('data').doc('tree')
      .set({nodes:treeNodes,updatedAt:new Date().toISOString()})
      .catch(function(){});
  }
}

// ── MAIN RENDER ────────────────────────────────────────────────────
function renderTree() {
  var wrap=document.getElementById('tree-canvas-wrap');
  var canvas=document.getElementById('tree-canvas');
  var svgEl=document.getElementById('tree-svg');
  var nodesEl=document.getElementById('tree-nodes');
  if(!wrap||!canvas||!svgEl||!nodesEl)return;

  if(!treeNodes.length){
    nodesEl.innerHTML='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#AAA;pointer-events:none"><div style="font-size:52px">🌳</div><div style="font-size:16px;margin-top:10px;font-weight:700">Chưa có sơ đồ</div><div style="font-size:13px;margin-top:6px">Bấm + Thêm gốc để bắt đầu</div></div>';
    svgEl.innerHTML='';canvas.style.width='100%';canvas.style.height='100%';return;
  }

  var layout=buildLayout2();
  if(!layout.length)return;

  var xs=layout.map(function(p){return p.x;}),ys=layout.map(function(p){return p.y;});
  var minX=Math.min.apply(null,xs), maxX=Math.max.apply(null,xs);
  var minY=Math.min.apply(null,ys), maxY=Math.max.apply(null,ys);
  var W=maxX-minX+NW*2+120, H=maxY-minY+NH*2+200;
  var OX=-minX+NW/2+60, OY=-minY+NH/2+60;

  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  svgEl.setAttribute('width',W); svgEl.setAttribute('height',H);

  var posMap={};
  layout.forEach(function(p){posMap[p.node.id]={x:p.x+OX,y:p.y+OY,level:p.level};});
  var maxLevel=layout.reduce(function(m,p){return Math.max(m,p.level);},0);

  // Build F-branch color map
  var fColorMap={};
  var roots=treeNodes.filter(function(n){return !n.parentId;});
  if(roots.length){
    var rootChildren=treeNodes.filter(function(n){return n.parentId===roots[0].id;});
    rootChildren.forEach(function(fc,i){
      function colorDesc(id){
        fColorMap[id]=F_COLORS[i%F_COLORS.length];
        treeNodes.filter(function(n){return n.parentId===id;}).forEach(function(c){colorDesc(c.id);});
      }
      colorDesc(fc.id);
    });
  }

  var svgH='';

  // ── Level separator T3→T4 ──
  if(maxLevel>=4){
    var l3=layout.filter(function(p){return p.level===3;});
    var l4=layout.filter(function(p){return p.level===4;});
    if(l3.length&&l4.length){
      var y3max=Math.max.apply(null,l3.map(function(p){return p.y+OY;}))+NH/2;
      var y4min=Math.min.apply(null,l4.map(function(p){return p.y+OY;}))-NH/2;
      var sepY=(y3max+y4min)/2;
      svgH+='<line x1="0" y1="'+sepY+'" x2="'+W+'" y2="'+sepY+'" stroke="#C8A84B" stroke-width="2" stroke-dasharray="10,6" opacity="0.8"/>';
      svgH+='<rect x="'+(W/2-95)+'" y="'+(sepY-12)+'" width="190" height="18" rx="9" fill="rgba(200,168,75,0.15)"/>';
      svgH+='<text x="'+(W/2)+'" y="'+(sepY+1)+'" text-anchor="middle" fill="#C8A84B" font-size="11" font-family="Arial" font-weight="700">── Tầng 3 ↔ Tầng 4 ──</text>';
    }
  }

  // ── Vertical center-line for each node (infinity line down) ──
  layout.forEach(function(item){
    var cx=item.x+OX;
    var cy=item.y+OY;
    svgH+='<line x1="'+cx+'" y1="'+(cy+NH/2)+'" x2="'+cx+'" y2="'+H+'" stroke="rgba(200,168,75,0.12)" stroke-width="1" stroke-dasharray="4,6"/>';
  });

  // ── Connection lines ──
  treeNodes.forEach(function(node){
    if(!node.parentId)return;
    var pp=posMap[node.parentId], cp=posMap[node.id];
    if(!pp||!cp)return;
    var x1=pp.x, y1=pp.y+NH/2+2;
    var x2=cp.x, y2=cp.y-NH/2-2;
    var mx=(x1+x2)/2, my=(y1+y2)/2;
    // Branch color
    var bCol = fColorMap[node.id] || (node.side==='L'?'#1A7A5E':'#3949AB');
    // Phả hệ 9 = special highlight
    var isDownline = node.isDownline9;
    var sw = isDownline ? '3' : '2';
    var dash = isDownline ? '' : '';
    var op = isDownline ? '0.9' : '0.55';
    var strokeStyle = isDownline
      ? 'stroke="'+bCol+'" stroke-width="3.5" stroke-dasharray="none" filter="url(#glow)"'
      : 'stroke="'+bCol+'" stroke-width="2" opacity="'+op+'"';
    svgH+='<path d="M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2+'" '+strokeStyle+' fill="none" stroke-linecap="round"/>';

    // Level badge on line
    var lv=posMap[node.id].level;
    svgH+='<circle cx="'+mx+'" cy="'+my+'" r="12" fill="white" stroke="'+bCol+'" stroke-width="1.5"/>';
    svgH+='<text x="'+mx+'" y="'+(my+4)+'" text-anchor="middle" fill="'+bCol+'" font-size="11" font-family="Arial" font-weight="700">'+lv+'</text>';
  });

  // ── Level labels (left side) ──
  var lvlYs={};
  layout.forEach(function(p){if(lvlYs[p.level]===undefined||p.y<lvlYs[p.level])lvlYs[p.level]=p.y+OY;});
  Object.keys(lvlYs).forEach(function(lv){
    var label = parseInt(lv)===0 ? 'Gốc' : 'T'+lv;
    svgH+='<rect x="2" y="'+(parseInt(lvlYs[lv])-10)+'" width="34" height="18" rx="4" fill="rgba(0,0,0,0.04)"/>';
    svgH+='<text x="10" y="'+(parseInt(lvlYs[lv])+4)+'" fill="#BBBBBB" font-size="11" font-family="Arial" font-weight="700">'+label+'</text>';
  });

  // SVG filter for glow
  svgH = '<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>' + svgH;
  svgEl.innerHTML=svgH;

  // ── Node elements ──
  var html='';
  layout.forEach(function(item){
    var node=item.node, px=item.x+OX, py=item.y+OY;
    var isRoot=!node.parentId;
    var level=item.level;
    var ch=treeNodes.filter(function(n){return n.parentId===node.id;});
    var hasL=ch.some(function(c){return c.side==='L';}), hasR=ch.some(function(c){return c.side==='R';});
    var fNum=level; // F-number = level (root=F0, child=F1, etc.)
    var bCol=fColorMap[node.id]||(isRoot?'#C8A84B':'#888');
    var borderCol=selectedHighlight===node.id?'#C8A84B':(isRoot?'#C8A84B':bCol);
    var bg=isRoot?'#1A1A1A':'white';
    var textCol=isRoot?'#C8A84B':'#1A1A1A';
    var metaCol=isRoot?'rgba(200,168,75,.65)':'#888';
    var subCount=countSubtree(node.id);
    var highlight=selectedHighlight===node.id?' box-shadow:0 0 0 3px #C8A84B,0 4px 20px rgba(200,168,75,.4);':'';

    html+='<div class="tnode" style="left:'+px+'px;top:'+py+'px;z-index:'+(level===0?10:5)+'">';
    html+='<div class="tnode-box" style="background:'+bg+';border-color:'+borderCol+';border-width:'+(isRoot?'2.5':'1.5')+'px;'+highlight+'" onclick="openNodeModal2(\''+node.id+'\',\'view\')">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">';
    html+='<div style="font-size:13px;font-weight:700;color:'+textCol+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px">'+node.name+'</div>';
    html+='<div style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;background:'+bCol+';color:white;flex-shrink:0;margin-left:3px">'+(isRoot?'Gốc':'F'+fNum)+'</div>';
    html+='</div>';
    html+='<div style="font-size:10px;color:'+metaCol+';margin-top:1px">'+(node.f1of?'👤'+node.f1of:'')+'</div>';
    html+='<div style="display:flex;justify-content:space-between;margin-top:3px">';
    html+='<div style="font-size:10px;font-weight:700;color:'+(isRoot?'rgba(200,168,75,.8)':'#1A7A5E')+'">'+(node.joinDate?'📅'+node.joinDate:'')+'</div>';
    html+='<div style="font-size:10px;color:'+metaCol+'">'+(node.idCode?'#'+node.idCode:'')+(subCount>0?' ('+subCount+')':'')+'</div>';
    html+='</div>';
    html+='</div>';
    if(!hasL)html+='<div class="tn-add tn-add-l" onclick="event.stopPropagation();openAddNodeModal2(\''+node.id+'\',\'L\')" title="Thêm nhánh trái" style="background:'+bCol+'">+</div>';
    if(!hasR)html+='<div class="tn-add tn-add-r" onclick="event.stopPropagation();openAddNodeModal2(\''+node.id+'\',\'R\')" title="Thêm nhánh phải" style="background:'+bCol+'">+</div>';
    html+='</div>';
  });
  nodesEl.innerHTML=html;
  applyTT2();
}

function countSubtree(id) {
  var count=0;
  function walk(nid){treeNodes.filter(function(n){return n.parentId===nid;}).forEach(function(c){count++;walk(c.id);});}
  walk(id);
  return count;
}

function deleteNodeModal() {
  if(!activeNodeModal||!activeNodeModal.nodeId)return;
  var node=treeNodes.find(function(n){return n.id===activeNodeModal.nodeId;});
  if(!node)return;
  var toRemove=[];
  function collect(id){toRemove.push(id);treeNodes.filter(function(n){return n.parentId===id;}).forEach(function(c){collect(c.id);});}
  collect(node.id);
  var name=node.name;
  treeNodes=treeNodes.filter(function(n){return toRemove.indexOf(n.id)<0;});
  saveTree2();closeNodeModal();renderTree();showToast('Đã xóa '+name);
}

function moveNodeSide(nodeId, side) {

// ── Star criteria check ─────────────────────────────────────────
// Tiêu chí 1 sao Prife: 2 F1 trực hệ khác nhau (không phân biệt Trái/Phải)
// Mỗi F1 tạo ra ≥4 ID (tính cả F1 đó) trong 2 tháng liên tiếp bất kỳ
function checkStarCriteria(nodeId) {
  var node=treeNodes.find(function(n){return n.id===nodeId;});
  if(!node)return null;
  // Lấy các F1 trực hệ (con trực tiếp)
  var f1List=treeNodes.filter(function(n){return n.parentId===nodeId;});

  function parseJD(jd){
    if(!jd)return null;
    var p=jd.split('.');if(p.length!==2)return null;
    var m=parseInt(p[0]),y=2000+parseInt(p[1]);
    return(isNaN(m)||isNaN(y)||m<1||m>12)?null:{abs:y*12+m,m:m,y:y};
  }

  // Tính best 2-month window cho 1 F1 (tính cả bản thân F1 + toàn bộ subtree)
  function calcF1Window(f1Id){
    // Thu thập tất cả ID trong subtree của F1 (bao gồm chính F1)
    var f1Node=treeNodes.find(function(n){return n.id===f1Id;});
    if(!f1Node)return{count:0,inWindow:0,windowStr:'—'};
    var allIds=[f1Node];
    function walk(id){treeNodes.filter(function(n){return n.parentId===id;}).forEach(function(c){allIds.push(c);walk(c.id);});}
    walk(f1Id);

    var mc={};
    allIds.forEach(function(n){
      var d=parseJD(n.joinDate);if(!d)return;
      mc[d.abs]=(mc[d.abs]||0)+1;
    });

    var best=0,bStr='—';
    Object.keys(mc).forEach(function(k){
      var k1=parseInt(k),k2=k1+1;
      var cnt=(mc[k1]||0)+(mc[k2]||0);
      if(cnt>best){
        best=cnt;
        var m1=k1%12||12,y1=Math.floor((k1-(k1%12||12))/12);
        var m2=k2%12||12,y2=Math.floor((k2-(k2%12||12))/12);
        bStr='T'+m1+'/'+y1+'–T'+m2+'/'+y2;
      }
    });
    return{count:allIds.length,inWindow:best,windowStr:bStr};
  }

  // Tính cho từng F1
  var f1Stats=f1List.map(function(f1){
    var stat=calcF1Window(f1.id);
    return{f1:f1,count:stat.count,inWindow:stat.inWindow,windowStr:stat.windowStr,ok:stat.inWindow>=4};
  });

  // Tìm 2 F1 tốt nhất
  var sorted=f1Stats.slice().sort(function(a,b){return b.inWindow-a.inWindow;});
  var best1=sorted[0]||null,best2=sorted[1]||null;
  var starReady=!!(best1&&best1.ok&&best2&&best2.ok);
  var totalInWindow=(best1?best1.inWindow:0)+(best2?best2.inWindow:0);
  var potential=totalInWindow>=1&&totalInWindow<8&&!starReady;

  // Backward compat: lc/rc còn dùng ở view (nhánh trái/phải)
  var ch=treeNodes.filter(function(n){return n.parentId===nodeId;});
  var lc=ch.find(function(c){return c.side==='L';});
  var rc=ch.find(function(c){return c.side==='R';});
  var lStat=lc?calcF1Window(lc.id):{count:0,inWindow:0,windowStr:'—'};
  var rStat=rc?calcF1Window(rc.id):{count:0,inWindow:0,windowStr:'—'};

  return{
    node:node, f1List:f1List, f1Stats:f1Stats,
    best1:best1, best2:best2,
    lc:lc, rc:rc,
    lCount:lStat.count, rCount:rStat.count,
    lInWindow:lStat.inWindow, rInWindow:rStat.inWindow,
    lWStr:lStat.windowStr, rWStr:rStat.windowStr,
    lOk:lc?lStat.inWindow>=4:false, rOk:rc?rStat.inWindow>=4:false,
    starReady:starReady, potential:potential, totalInWindow:totalInWindow
  };
}

function exportAllData() {
  var data = {
    version: 2,
    exportDate: new Date().toISOString(),
    ns: NS,
    members: members,
    treeNodes: treeNodes,
    settings: {}
  };
  // Export KH data
  try {
    var khData = {};
    Object.keys(localStorage).forEach(function(k){
      if(k.startsWith('ta_'+NS+'_')) khData[k.replace('ta_'+NS+'_','')] = localStorage.getItem(k);
    });
    data.localStorage = khData;
  } catch(e) {}
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'TamAn_Backup_'+NS+'_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Đã xuất dữ liệu ra file JSON');
}

function importAllData() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if(!file)return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if(data.members) { members = data.members; saveMembers(); }
        if(data.treeNodes) { treeNodes = data.treeNodes; saveTree2(); }
        if(data.localStorage) {
          Object.keys(data.localStorage).forEach(function(k){
            nmSet(k, data.localStorage[k]);
          });
        }
        renderAll(); renderTree(); updateStats();
        showToast('✓ Đã import dữ liệu thành công! ('+( data.members?data.members.length:0)+' thành viên)');
      } catch(err) {
        showToast('❌ File không hợp lệ: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

var starScale2=1,starOffset2={x:0,y:0},starPanning2=false,starPanStart2={x:0,y:0};
var activeStarNode=null;
function applyStarT(){var c=document.getElementById('star-canvas');if(c)c.style.transform='translate('+starOffset2.x+'px,'+starOffset2.y+'px) scale('+starScale2+')';}
function starZoom(d){starScale2=Math.min(3,Math.max(0.1,starScale2+d));applyStarT();}
function starFit(){
  var wrap=document.getElementById('star-canvas-wrap'),canvas=document.getElementById('star-canvas');
  if(!wrap||!canvas)return;
  var ww=wrap.clientWidth,wh=wrap.clientHeight;
  var cw=parseFloat(canvas.style.width)||ww,ch=parseFloat(canvas.style.height)||wh;
  if(cw<=0||ch<=0)return;
  starScale2=Math.min(ww/cw,wh/ch)*0.82;
  starOffset2={x:(ww-cw*starScale2)/2,y:(wh-ch*starScale2)/2};
  applyStarT();
}
function initStarPan(){
  var wrap=document.getElementById('star-canvas-wrap');if(!wrap||wrap._starInit)return;wrap._starInit=true;
  function isBg(el){return['star-canvas-wrap','star-canvas','star-nodes','star-svg'].indexOf(el.id)>=0||['svg','circle','line','path','text','rect'].indexOf((el.tagName||'').toLowerCase())>=0;}
  wrap.addEventListener('mousedown',function(e){if(isBg(e.target)){starPanning2=true;starPanStart2={x:e.clientX-starOffset2.x,y:e.clientY-starOffset2.y};wrap.style.cursor='grabbing';}});
  window.addEventListener('mousemove',function(e){if(!starPanning2)return;starOffset2={x:e.clientX-starPanStart2.x,y:e.clientY-starPanStart2.y};applyStarT();});
  window.addEventListener('mouseup',function(){starPanning2=false;var w=document.getElementById('star-canvas-wrap');if(w)w.style.cursor='grab';});
  wrap.addEventListener('touchstart',function(e){if(e.touches.length===1){starPanning2=true;starPanStart2={x:e.touches[0].clientX-starOffset2.x,y:e.touches[0].clientY-starOffset2.y};}},{passive:true});
  wrap.addEventListener('touchmove',function(e){if(starPanning2&&e.touches.length===1){e.preventDefault();starOffset2={x:e.touches[0].clientX-starPanStart2.x,y:e.touches[0].clientY-starPanStart2.y};applyStarT();}},{passive:false});
  wrap.addEventListener('touchend',function(){starPanning2=false;});
  wrap.addEventListener('wheel',function(e){e.preventDefault();starZoom(e.deltaY<0?0.12:-0.12);},{passive:false});
}

function buildFColorMap(){
  var map={};
  var roots=treeNodes.filter(function(n){return !n.parentId;});if(!roots.length)return map;
  treeNodes.filter(function(n){return n.parentId===roots[0].id;}).forEach(function(fc,i){
    var col=F_COLORS[i%F_COLORS.length];
    function cd(id){map[id]=col;treeNodes.filter(function(n){return n.parentId===id;}).forEach(function(c){cd(c.id);});}
    cd(fc.id);
  });
  return map;
}

function renderStarChart(){
  var wrap=document.getElementById('star-canvas-wrap'),canvas=document.getElementById('star-canvas');
  var svgEl=document.getElementById('star-svg'),nodesEl=document.getElementById('star-nodes');
  if(!wrap||!canvas||!svgEl||!nodesEl)return;
  if(!treeNodes.length){
    nodesEl.innerHTML='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none"><div style="font-size:52px">⭐</div><div style="font-size:16px;font-weight:700;color:rgba(255,255,255,.35);margin-top:10px">Chưa có sơ đồ</div><div style="font-size:13px;color:rgba(255,255,255,.2);margin-top:6px">Thêm dữ liệu ở tab Nhị phân trước</div></div>';
    svgEl.innerHTML='';canvas.style.width='100%';canvas.style.height='100%';return;
  }
  var roots=treeNodes.filter(function(n){return !n.parentId;});
  if(!roots.length)return;
  var W=2400,H=2400,CX=W/2,CY=H/2;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  svgEl.setAttribute('width',W);svgEl.setAttribute('height',H);

  // Assign radial positions
  var positions={};
  function assignPos(nodeId,cx,cy,a0,a1,depth){
    positions[nodeId]={x:cx,y:cy};
    var ch=treeNodes.filter(function(n){return n.parentId===nodeId;});
    if(!ch.length)return;
    var sector=(a1-a0)/ch.length;
    var r=Math.min(150+depth*120,CX-80);
    ch.forEach(function(c,i){
      var angle=a0+sector*i+sector/2;
      var nx=cx+Math.cos(angle)*r,ny=cy+Math.sin(angle)*r;
      assignPos(c.id,nx,ny,a0+sector*i,a0+sector*(i+1),depth+1);
    });
  }
  assignPos(roots[0].id,CX,CY,-Math.PI,Math.PI,1);

  var fColorMap=buildFColorMap();
  var svgH='<defs><filter id="sg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';

  // Orbit rings per level
  var levelR={};
  treeNodes.forEach(function(n){
    var lv=computeLevel2(n.id);
    var p=positions[n.id];if(!p||lv===0)return;
    var r=Math.sqrt(Math.pow(p.x-CX,2)+Math.pow(p.y-CY,2));
    if(!levelR[lv])levelR[lv]=[];levelR[lv].push(r);
  });
  Object.keys(levelR).forEach(function(lv){
    var avg=levelR[lv].reduce(function(a,b){return a+b;},0)/levelR[lv].length;
    svgH+='<circle cx="'+CX+'" cy="'+CY+'" r="'+avg+'" fill="none" stroke="rgba(200,168,75,0.06)" stroke-width="1" stroke-dasharray="4,10"/>';
    svgH+='<text x="'+(CX+avg-12)+'" y="'+(CY-4)+'" fill="rgba(200,168,75,0.25)" font-size="10" font-family="Arial">F'+lv+'</text>';
  });

  // Connection lines
  treeNodes.forEach(function(node){
    if(!node.parentId)return;
    var pp=positions[node.parentId],cp=positions[node.id];if(!pp||!cp)return;
    var bCol=fColorMap[node.id]||'rgba(200,168,75,.35)';
    if(node.isDownline9){
      svgH+='<line x1="'+pp.x+'" y1="'+pp.y+'" x2="'+cp.x+'" y2="'+cp.y+'" stroke="'+bCol+'" stroke-width="3" opacity="0.8" filter="url(#sg)"/>';
      svgH+='<line x1="'+pp.x+'" y1="'+pp.y+'" x2="'+cp.x+'" y2="'+cp.y+'" stroke="white" stroke-width="1" stroke-dasharray="5,8" opacity="0.4"/>';
    }else{
      svgH+='<line x1="'+pp.x+'" y1="'+pp.y+'" x2="'+cp.x+'" y2="'+cp.y+'" stroke="'+bCol+'" stroke-width="1.5" opacity="0.38"/>';
    }
  });
  svgEl.innerHTML=svgH;

  // Node circles
  var html='';
  treeNodes.forEach(function(node){
    var pos=positions[node.id];if(!pos)return;
    var isRoot=!node.parentId,lv=computeLevel2(node.id);
    var bCol=isRoot?'#C8A84B':(fColorMap[node.id]||'rgba(200,168,75,.5)');
    if(!isRoot&&node.f1of){var _bt=treeNodes.find(function(n){return n.name===node.f1of;});if(_bt&&fColorMap[_bt.id])bCol=fColorMap[_bt.id];}
    var star=checkStarCriteria(node.id);
    var isActive=activeStarNode===node.id;
    var sz=isRoot?58:Math.max(28,48-lv*5);
    var bg=isRoot?'#1A1A1A':('rgba(255,255,255,'+(Math.max(0.05,0.14-lv*0.02))+')');
    var border=isActive?'3px solid #C8A84B':('2px solid '+bCol);
    var glow=isActive?'box-shadow:0 0 0 4px rgba(200,168,75,.3),0 0 20px rgba(200,168,75,.4);':(star&&star.starReady?'box-shadow:0 0 14px #1A7A5E;':'');
    var init=getInit(node.name);
    var lastName=node.name.split(' ').pop().slice(0,9);
    var fLabel=isRoot?'T0':('F'+lv);
    html+='<div class="tnode" style="left:'+pos.x+'px;top:'+pos.y+'px" onclick="openStarNode(\''+node.id+'\')">';
    html+='<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+bg+';border:'+border+';'+glow+'display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:box-shadow .15s">';
    html+='<div style="font-size:'+(isRoot?14:Math.max(9,12-lv))+'px;font-weight:700;color:'+(isRoot?'#C8A84B':'rgba(255,255,255,.85)')+';line-height:1.2;text-align:center;padding:0 2px">'+init+'</div>';
    if(node.joinDate)html+='<div style="font-size:8px;color:rgba(255,255,255,.4);margin-top:1px">'+node.joinDate+'</div>';
    if(star&&star.starReady)html+='<div style="font-size:9px;line-height:1">⭐</div>';
    else if(star&&star.potential)html+='<div style="font-size:9px;color:#FB8C00;font-weight:700;line-height:1">'+star.total+'</div>';
    html+='</div>';
    // Name label — always show for root and active, faint for others
    html+='<div style="position:absolute;top:'+(sz+3)+'px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:'+(isRoot?'#C8A84B':isActive?'rgba(255,255,255,.8)':'rgba(255,255,255,.28)')+';white-space:nowrap;pointer-events:none;text-align:center">'+lastName+'</div>';
    // F-badge
    if(!isRoot)html+='<div style="position:absolute;top:-6px;right:-4px;background:'+bCol+';color:white;font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;pointer-events:none">'+fLabel+'</div>';
    html+='</div>';
  });
  nodesEl.innerHTML=html;
  applyStarT();
}

function openStarNode(nodeId){
  activeStarNode=(activeStarNode===nodeId)?null:nodeId;
  renderStarChart();
  if(activeStarNode) openNodeModal2(nodeId,'view');
}

function renderCumReport(){
  var el=document.getElementById('cum-content');if(!el)return;
  var now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
  var months=[];
  for(var i=11;i>=0;i--){var d=new Date(cy,cm-i,1);months.push({y:d.getFullYear(),m:d.getMonth(),label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][d.getMonth()]+'/'+d.getFullYear()});}
  var kpiData={};
  months.forEach(function(mo){
    var mk=mo.y+'-'+mo.m;kpiData[mk]={};
    members.forEach(function(mem){var obj={};MONTH_KPI.forEach(function(f){obj[f.id]=parseInt(nmGet('mo_'+mem.id+'_'+mk+'_'+f.id,'0'))||0;});kpiData[mk][mem.id]=obj;});
  });
  var html='<div style="background:white;border-radius:12px;border:1px solid #E8E8E8;padding:14px;margin-bottom:12px">';
  html+='<div style="font-weight:700;font-size:15px;margin-bottom:12px">📊 Tổng hợp cụm theo tháng</div>';
  html+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">';
  html+='<label style="font-size:13px;font-weight:700">Từ:</label><select id="cum-from" class="sel" style="width:110px" onchange="renderCumTable()">';
  months.forEach(function(mo,i){html+='<option value="'+i+'">'+mo.label+'</option>';});
  html+='</select><label style="font-size:13px;font-weight:700">Đến:</label><select id="cum-to" class="sel" style="width:110px" onchange="renderCumTable()">';
  months.forEach(function(mo,i){html+='<option value="'+i+'"'+(i===11?' selected':'')+'>'+mo.label+'</option>';});
  html+='</select><button class="btn btn-g btn-sm" onclick="renderCumTable()">Xem</button></div>';
  html+='<div id="cum-table"></div></div>';
  el.innerHTML=html;
  window._cumMonths=months;window._cumKpiData=kpiData;
  renderCumTable();
}

function renderCumTable(){
  var el=document.getElementById('cum-table');if(!el)return;
  var months=window._cumMonths||[];var kpiData=window._cumKpiData||{};
  var from=parseInt((document.getElementById('cum-from')||{value:0}).value);
  var to=parseInt((document.getElementById('cum-to')||{value:11}).value);
  if(from>to){el.innerHTML='<div style="color:#E53935;font-size:13px">Tháng bắt đầu phải trước tháng kết thúc</div>';return;}
  var range=months.slice(from,to+1);
  if(!range.length||!members.length){el.innerHTML='<div style="color:#AAA;font-size:13px;padding:20px 0">Không có dữ liệu</div>';return;}
  var memberTotals=members.map(function(mem){var totals={};MONTH_KPI.forEach(function(f){totals[f.id]=0;});range.forEach(function(mo){var mk=mo.y+'-'+mo.m;if(kpiData[mk]&&kpiData[mk][mem.id])MONTH_KPI.forEach(function(f){totals[f.id]+=(kpiData[mk][mem.id][f.id]||0);});});return{mem:mem,totals:totals};});
  var grand={};MONTH_KPI.forEach(function(f){grand[f.id]=memberTotals.reduce(function(s,r){return s+r.totals[f.id];},0);});
  var html='<div style="font-size:12px;color:#888;margin-bottom:10px">'+range[0].label+' → '+range[range.length-1].label+' ('+range.length+' tháng)</div>';
  html+='<div class="ov-wrap"><table class="ovt"><thead><tr><th style="text-align:left">Thành viên</th>';
  MONTH_KPI.forEach(function(f){html+='<th>'+f.icon+' '+f.lbl+'</th>';});
  html+='</tr></thead><tbody>';
  memberTotals.forEach(function(r){html+='<tr><td>'+r.mem.name+'<div style="font-size:10px;color:#AAA">'+r.mem.role+'</div></td>';MONTH_KPI.forEach(function(f){var v=r.totals[f.id];html+='<td style="font-weight:'+(v>0?'700':'400')+';color:'+(v>0?'#1A7A5E':'#CCC')+'">'+v+'</td>';});html+='</tr>';});
  html+='<tr style="background:#1A1A1A"><td style="color:#C8A84B;font-weight:700">TỔNG</td>';
  MONTH_KPI.forEach(function(f){html+='<td style="color:#C8A84B;font-weight:700">'+grand[f.id]+'</td>';});
  html+='</tr></tbody></table></div>';
  html+='<div style="font-weight:700;font-size:13px;margin:14px 0 10px">Chi tiết từng tháng</div>';
  range.forEach(function(mo){var mk=mo.y+'-'+mo.m;var mT={};MONTH_KPI.forEach(function(f){mT[f.id]=0;});members.forEach(function(mem){if(kpiData[mk]&&kpiData[mk][mem.id])MONTH_KPI.forEach(function(f){mT[f.id]+=(kpiData[mk][mem.id][f.id]||0);});});html+='<div style="background:white;border:1px solid #E8E8E8;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div style="font-weight:700;font-size:13px;min-width:70px">'+mo.label+'</div>';MONTH_KPI.forEach(function(f){html+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:#1A7A5E">'+mT[f.id]+'</div><div style="font-size:10px;color:#AAA">'+f.lbl+'</div></div>';});html+='</div>';});
  el.innerHTML=html;
}
